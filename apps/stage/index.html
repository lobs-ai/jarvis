<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jarvis</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="stage">
      <div id="exhibits"></div>
      <aside id="rail">
        <div id="transcript"></div>
      </aside>
      <footer id="console">
        <div id="orb" title="click to interrupt">
          <div class="core"></div>
          <div class="ring"></div>
        </div>
        <form id="inputForm" autocomplete="off">
          <input id="input" type="text" placeholder="talk or type…" />
        </form>
        <div id="modes">
          <button id="micToggle" type="button" title="mic is off — click or Space to listen">🎙</button>
          <div id="micLevel" class="muted" title="mic level"><div class="fill"></div></div>
          <button id="quietToggle" type="button" title="quiet mode: captions only">🔊</button>
          <button id="newConvo" type="button" title="new conversation">✚</button>
          <button id="settingsToggle" type="button" title="settings">⚙</button>
          <span id="conn" class="dot" title="connection"></span>
        </div>
      </footer>
      <div id="settingsPanel" class="hidden">
        <h3>settings</h3>
        <label>model
          <select id="setModel">
            <option value="claude-opus-4-8">opus 4.8</option>
            <option value="claude-sonnet-5">sonnet 5</option>
            <option value="claude-fable-5">fable 5</option>
            <option value="claude-haiku-4-5">haiku 4.5</option>
          </select>
        </label>
        <label>thinking
          <select id="setThinking">
            <option value="off">off</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </label>
        <label>wiki location
          <input id="setWiki" type="text" spellcheck="false" placeholder="/path/to/wiki" />
        </label>
        <div class="row">
          <button id="setApply" type="button">apply</button>
          <span class="hint">model &amp; thinking start a fresh conversation</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
